{% extends 'base.html' %}

{% block pageheading %}
    menu
    <div class="categories">
    {% for record in cat_results %}
        <li> <a href="/menu/{{ record[0] }}"> {{ record[1] }} </a></li>
    {% endfor %}
    </div>
{% endblock %}

{% block main %}
    <div class="products">
        {% for record in results %}
        <div class="product-box">
            <h3 class="product-box-heading"> {{ record[1] }} </h3>
            <img src="/static/images/{{ record[4] }}.jpg">
            <p class="product-box-info"> {{ record[2] }} </p>
        </div>
        {% endfor %}
    </div>
{% endblock %}
